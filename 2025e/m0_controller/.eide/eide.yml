    - path: ../../controller/documents/sdk/kernel/freertos/Source/portable/GCC/ARM_CM0/port.c
    - path: ../../controller/documents/sdk/kernel/freertos/Source/portable/GCC/ARM_CM0/portasm.c
    - path: ../../controller/documents/sdk/kernel/freertos/Source/portable/MemMang/heap_4.c
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 976a898e783e1ced75b883a03a986be7
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - __MSPM0G3507__
      incList:
        - .
        - inc
        - Debug
        - modules/MCP23017/inc
        - modules/ICM42688/inc
        - modules/Motion Control/inc
        - modules/Sens-Decision/inc
        - ../../controller/documents/sdk/source
        - ../../controller/documents/sdk/source/third_party/CMSIS/Core/Include
        - ../../controller/documents/sdk/kernel/freertos/Source/include
        - ../../controller/documents/sdk/kernel/freertos/Source/portable/GCC/ARM_CM0
      libList: []
    excludeList:
      - "**/example_usage.c"
      - "**/temp/**"
      - "**/OLED*"
    settings:
      debugger: cortex-debug
    toolchain: AC6
    toolchainConfigMap:
      AC6:
        archExtensions: ""
        cpuType: Cortex-M0+
        floatingPointHardware: none
        options:
          version: 3
          afterBuildTasks: []
          asm-compiler:
            $use: asm-auto
            misc-controls: ""
          beforeBuildTasks:
            - name: Generate SysConfig
              command: >-
                C:/ti/sysconfig_1.26.2/sysconfig_cli.bat
                --product "${ProjectRoot}/../../controller/documents/sdk/.metadata/product.json"
                --device MSPM0G3507
                --package "LQFP-48(PT)"
                --script "${ProjectRoot}/NewProject1.syscfg"
                --output "${ProjectRoot}/Debug"
                --compiler keil
              stopBuildAfterFailed: true
          c/cpp-compiler:
            C_FLAGS:
              - -fshort-enums
              - -fshort-wchar
            language-c: c99
            language-cpp: c++11
            link-time-optimization: false
            optimization: level-image-size
          global:
            output-debug-info: enable
            use-microLIB: true
          linker:
            $outputTaskExcludes:
              - .bin
            misc-controls: --diag_suppress=L6329
            output-format: elf
        scatterFilePath: mspm0g3507.sct
        storageLayout:
          RAM:
            - id: 1
              isChecked: false
              mem:
                size: "0x8000"
                startAddr: "0x20200000"
              noInit: false
              tag: RAM
            - id: 2
              isChecked: false
              mem:
                size: "0x8000"
                startAddr: "0x20300000"
              noInit: false
              tag: RAM
            - id: 3
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 1
              isChecked: true
              mem:
                size: "0x8000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
            - id: 2
              isChecked: false
              mem:
                size: "0x8000"
                startAddr: "0x20100000"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 3
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x20000"
                startAddr: "0x0"
              tag: IROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x20000"
                startAddr: "0x400000"
              tag: IROM
        useCustomScatterFile: false
      GCC:
        archExtensions: ""
        cpuType: Cortex-M0+
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: ""
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            misc-control: ""
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: ""
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: <YOUR_LINKER_SCRIPT>.lds
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
