version: "4.1"
name: NewProject1
type: ARM
deviceName: MSPM0G3507
packDir: .pack/TexasInstruments/MSPM0G_DFP.1.2.1
srcDirs:
  - src
  - Debug
  - modules/MCP23017/src
  - modules/ICM42688/src
  - modules/Motion Control/src
  - modules/Sens-Decision/src
virtualFolder:
