        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x00000000"
        bin: ""
        interface: cmsis-dap
        target: ti_mspm0
